apiVersion: v1
kind: ConfigMap
metadata:
  name: sample
  namespace: team-a
data:
  value: from-team-a
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: workload
spec:
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
      - name: app
        image: nginx
        env:
        - name: CM_VALUE
          value: from-team-a
