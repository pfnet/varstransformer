apiVersion: v1
kind: Secret
metadata:
  name: sample
  namespace: team-b
stringData:
  value: wrong-value
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample
  namespace: team-a
data:
  value: configmap-value
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
spec:
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
      - name: app
        image: nginx
        env:
        - name: CM_VALUE
          value: "$(CM_VALUE)"
