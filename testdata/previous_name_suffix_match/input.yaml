apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-config-renamed
  annotations:
    internal.config.kubernetes.io/previousNames: sample-config
    internal.config.kubernetes.io/previousNamespaces: ""
    internal.config.kubernetes.io/previousKinds: ConfigMap
data:
  value: from-suffix
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
spec:
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
      - name: app
        image: nginx
        env:
        - name: CONFIG_VALUE
          value: "$(CONFIG_VALUE)"
